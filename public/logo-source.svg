<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <!-- Fond écusson arrondi -->
  <rect width="512" height="512" rx="112" fill="#1D9E75"/>

  <!-- Ombre douce interne -->
  <rect width="512" height="512" rx="112" fill="url(#innerGlow)" opacity="0.18"/>

  <!-- Feuille principale : forme organique élégante -->
  <!-- Corps de la feuille -->
  <path d="
    M256 68
    C180 82 128 148 136 248
    C144 318 196 372 256 388
    C316 372 368 318 376 248
    C384 148 332 82 256 68 Z
  " fill="white" opacity="0.97"/>

  <!-- Nervure centrale -->
  <line x1="256" y1="130" x2="256" y2="400" stroke="#1D9E75" stroke-width="12" stroke-linecap="round" opacity="0.55"/>

  <!-- Nervures secondaires gauche -->
  <line x1="256" y1="200" x2="190" y2="250" stroke="#1D9E75" stroke-width="7" stroke-linecap="round" opacity="0.35"/>
  <line x1="256" y1="260" x2="175" y2="310" stroke="#1D9E75" stroke-width="7" stroke-linecap="round" opacity="0.35"/>
  <line x1="256" y1="320" x2="200" y2="360" stroke="#1D9E75" stroke-width="6" stroke-linecap="round" opacity="0.30"/>

  <!-- Nervures secondaires droite -->
  <line x1="256" y1="200" x2="322" y2="250" stroke="#1D9E75" stroke-width="7" stroke-linecap="round" opacity="0.35"/>
  <line x1="256" y1="260" x2="337" y2="310" stroke="#1D9E75" stroke-width="7" stroke-linecap="round" opacity="0.35"/>
  <line x1="256" y1="320" x2="312" y2="360" stroke="#1D9E75" stroke-width="6" stroke-linecap="round" opacity="0.30"/>

  <!-- Tige -->
  <line x1="256" y1="388" x2="256" y2="452" stroke="white" stroke-width="18" stroke-linecap="round" opacity="0.92"/>

  <defs>
    <radialGradient id="innerGlow" cx="50%" cy="30%" r="60%">
      <stop offset="0%" stop-color="white"/>
      <stop offset="100%" stop-color="#1D9E75"/>
    </radialGradient>
  </defs>
</svg>
